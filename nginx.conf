server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for faster loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm;
    gzip_min_length 1024;

    # IMPORTANT: firebase-messaging-sw.js must NEVER be cached aggressively.
    # Browsers/CDNs caching this file means a new deploy's SW update won't
    # take effect, and FCM token registration can silently break.
    location = /firebase-messaging-sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # Flutter's own service worker (flutter_service_worker.js) — same deal
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # main.dart.js and other versioned/hashed assets can be cached aggressively
    location ~* \.(js|css|wasm)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached — it references the hashed assets
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — Flutter web uses client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}